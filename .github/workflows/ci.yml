name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    if: github.event_name == 'push' || github.head_ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm astro check

      - name: Lint
        run: pnpm oxlint .

      - name: Build
        run: pnpm build
